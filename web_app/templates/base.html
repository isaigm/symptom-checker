<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Lista de Síntomas{% endblock %}</title>
    <!-- Vincular a Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

</head>
<body>
    <div class="navbar navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" >Aplicación de Síntomas</a>
            <form class="d-flex"  method="GET">
                <input class="form-control me-2" type="search" placeholder="Buscar síntoma" aria-label="Search" name="query">
                <button class="btn btn-outline-success" type="submit">Buscar</button>
            </form>
        </div>
    </div>
    <div class="container-fluid">
        <div class="row">
            <!-- Barra lateral -->
            <div class="col-3 sidebar">
                <h3 class="text-center mb-4">Grupos de síntomas</h3>
                <ul class="nav flex-column">
                    {% block sidebar %}
                    <!-- Lista de categorías que se añadirá dinámicamente -->
                    {% endblock %}
                </ul>
            </div>

            <!-- Contenido principal -->
            <div class="col content">
                {% block content %}
                <!-- Contenido que se añadirá dinámicamente -->
                {% endblock %}
            </div>
        </div>
    </div>

    <!-- Vincular a los scripts de Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
